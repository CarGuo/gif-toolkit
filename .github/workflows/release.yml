# R-71 — Tag-driven cross-platform release pipeline.
#
# What this workflow does:
#   1. Triggers on a `v*` tag push (e.g. `git push origin v0.1.0`) OR
#      a manual `workflow_dispatch` so we can dry-run from the
#      Actions tab without creating a tag.
#   2. Spawns a build matrix across macos-latest, windows-latest, and
#      ubuntu-latest. Each runner stamps `src/shared/buildInfo.ts`
#      with the SHA / version / build time / runner os-arch BEFORE
#      `npm run build` so the fingerprint gets tree-baked into both
#      the main bundle (tsc) and the renderer bundle (vite).
#   3. Runs the full test suite on each platform — this is the only
#      place where vitest runs against the real OS, so it doubles as
#      our cross-platform regression net.
#   4. Calls electron-builder per OS with `--publish always`, which
#      uploads the artifacts directly to a GitHub Release tagged with
#      the same `v*` ref. The release is created in DRAFT first
#      (electron-builder default), so we can sanity-check the asset
#      list before flipping it public.
#
# Important non-obvious decisions:
#   * macOS is built UN-SIGNED (`CSC_IDENTITY_AUTO_DISCOVERY=false`).
#     First-launch Gatekeeper prompt is documented in the README.
#   * Windows is built UN-SIGNED. SmartScreen will warn on first
#     install; this is acceptable for an OSS hobby release.
#   * Linux only ships x64 in this workflow. Building arm64 .deb /
#     .AppImage on an x64 runner cross-bakes the wrong native modules
#     (sharp / ffmpeg-static prebuilds are arch-specific). Users on
#     arm64 Linux are pointed at "build from source" in the README.
#   * We do NOT cache `node_modules` between runs — the postinstall
#     `npm rebuild` is OS-specific and a stale cache would cross-link
#     the wrong native binaries. We DO cache `~/.npm` via setup-node's
#     built-in `cache: npm`, which is just the registry tarballs.
#   * R-80 — postinstall now ALSO runs `electron-rebuild -f -w
#     better-sqlite3` so the SQLite native module is rebuilt against
#     the embedded Electron 31 ABI on every CI runner. Failing to do
#     so produces a "NODE_MODULE_VERSION mismatch" crash on first
#     `new Database(...)` call. The 'native modules' job adds ~30s
#     per platform but is non-negotiable for cross-platform release.
#   * `permissions: contents: write` is required so the
#     auto-provisioned `GITHUB_TOKEN` can create the release and
#     upload assets. Without it, electron-builder's publish step
#     fails with 403.
#   * R-UPDATE — Client-side check for updates. The published draft
#     release is consumed by the in-app updater
#     ([src/main/updater.ts](../../src/main/updater.ts)), which polls
#     `GET /repos/CarGuo/gif-toolkit/releases/latest` 5s after launch
#     (and on demand from the TopBar / tray menu). This deliberately
#     does NOT use electron-updater: the unsigned-binary stance above
#     is incompatible with electron-updater's auto-install path on
#     macOS / Windows, and a "open browser → download manually" flow
#     keeps the trust model simple. To make a release visible to
#     users, REMEMBER TO PROMOTE THE DRAFT TO PUBLISHED — drafts are
#     not returned by `/releases/latest` and the updater will report
#     "no release" until the draft is flipped public.
#
# How to trigger a real release (operator's runbook):
#   $ git tag v0.1.0
#   $ git push origin v0.1.0
# How to dry-run without a tag (for debugging this workflow):
#   GitHub UI → Actions → "Release" → Run workflow → enter "0.1.0".

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (no leading v, e.g. 0.1.0). Used only for fingerprint stamping; no tag is created.'
        required: true
        default: '0.0.0-dispatch'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            builder_args: '--mac --x64 --arm64'
          - os: windows-latest
            platform: win
            builder_args: '--win --x64'
          - os: ubuntu-latest
            platform: linux
            builder_args: '--linux --x64'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We need the full history so `git rev-parse --short=7 HEAD`
          # in scripts/write-build-info.mjs returns the real SHA when
          # GIFTK_COMMIT isn't passed. Default `fetch-depth: 1` would
          # also work since we resolve HEAD, but keeping 0 lets us
          # inspect prior commits if a future build step ever wants
          # to embed "commits since last tag" or similar.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Linux runners need extra deps for electron-builder's AppImage
      # / deb tooling. macOS and Windows runners ship them already.
      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools \
            rpm \
            fakeroot \
            dpkg

      - name: Resolve build version
        id: ver
        shell: bash
        run: |
          # Prefer the tag (`v1.2.3` -> `1.2.3`); fall back to the
          # workflow_dispatch input; last resort is package.json.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RAW="${GITHUB_REF_NAME}"
          else
            RAW="${{ github.event.inputs.version }}"
          fi
          VERSION="${RAW#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Stamp build info
        shell: bash
        env:
          GIFTK_VERSION: ${{ steps.ver.outputs.version }}
          GIFTK_COMMIT: ${{ github.sha }}
          GIFTK_RUN_NUMBER: ${{ github.run_number }}
          # We deliberately tag the OS+arch of the RUNNER, not of any
          # specific produced artifact. A single mac-latest runner
          # builds both x64 and arm64 dmgs; the buildPlatform string
          # records only that they were both built on darwin-arm64.
          GIFTK_BUILD_PLATFORM: ${{ runner.os }}-${{ runner.arch }}
        run: node scripts/write-build-info.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      # R-80 — DB-backed test suite. The repos exercise real
      # better-sqlite3 against in-memory DBs, so the native module
      # must be linked against the *host* Node ABI for this step.
      # Before: ABI = Electron 31 (postinstall left it that way).
      # After:  ABI = Electron 31 (we re-rebuild via electron-rebuild
      # so the subsequent `npm run build` / electron-builder steps
      # see the right binary). The two rebuilds add ~30s to CI but
      # are non-negotiable: skipping them means the DB suite never
      # runs.
      - name: Run DB tests (rebuild to Node ABI)
        run: npm run test:db:to-node
      - name: Run DB tests
        run: npm run test:db:run
      - name: Re-rebuild better-sqlite3 for Electron
        run: npm run test:db:to-electron

      # R-80 hardening — explicit ABI verification probe. `electron-rebuild`
      # has historically returned exit 0 for partial / silent failures
      # (network blip, npm cache miss). If the .node binary is left at
      # the Node ABI instead of Electron's, every renderer DB call
      # silently rejects (renderer hooks .catch() => {} swallow it),
      # users see "history works on first run, then forgets everything"
      # — the worst kind of bug. The most reliable check is to run the
      # Electron binary itself with ELECTRON_RUN_AS_NODE and require
      # better-sqlite3; any ABI mismatch throws synchronously with a
      # clear "NODE_MODULE_VERSION ..." message.
      - name: Verify better-sqlite3 ABI matches Electron
        shell: bash
        env:
          ELECTRON_RUN_AS_NODE: '1'
        run: |
          set -euo pipefail
          ELECTRON_BIN=$(node -p "require('electron')")
          echo "Probing $ELECTRON_BIN with better-sqlite3…"
          "$ELECTRON_BIN" -e "const db = new (require('better-sqlite3'))(':memory:'); db.exec('CREATE TABLE t(a)'); db.prepare('INSERT INTO t VALUES (?)').run(1); console.log('ok abi=' + process.versions.modules); db.close();"

      - name: Build renderer + main bundles
        run: npm run build

      - name: Package and publish to GitHub Release
        shell: bash
        env:
          # GH_TOKEN (not GITHUB_TOKEN) is what electron-builder reads
          # for the GitHub publisher. They're the same token, just a
          # different env var name electron-builder expects.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code-signing identity available — disable auto-discovery
          # so electron-builder doesn't try to sign with a missing
          # certificate and abort the build.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          # `--publish always` ensures we upload the artifacts whether
          # or not we're on a tag (workflow_dispatch dry-runs still
          # publish to a draft release; the operator can inspect the
          # asset list and either promote or delete the draft).
          npx --no-install electron-builder ${{ matrix.builder_args }} --publish always
