<!doctype html>
<html lang="en" style="background:transparent">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:; img-src * data: blob:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gif Toolkit Dock</title>
    <style>
      /* R-DOCK-FLOATING #no-backdrop —— html/body/#root 全链路 transparent，
         避免 React 还没 hydrate 时 BrowserWindow 客户区被默认 systemBackground
         填一层白色。inline style+CSS 双保险。 */
      html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: transparent !important; background-color: transparent !important; user-select: none; -webkit-user-select: none; font-family: -apple-system, system-ui, sans-serif; color: #fff; }
      #root { position: fixed; inset: 0; background: transparent !important; }
    </style>
  </head>
  <body style="background:transparent">
    <div id="root"></div>
    <script type="module" src="./dockOverlay.tsx"></script>
  </body>
</html>
